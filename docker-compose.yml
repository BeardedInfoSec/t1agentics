# T1 Agentics - Production docker-compose
#
# All service ports are internal-only. Only Caddy exposes 80/443 to the host.
# Generated/used by install.sh. Values are interpolated from .env at repo root.

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: t1-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentcore}
      POSTGRES_USER: ${POSTGRES_USER:-agentcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./native-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentcore} -d ${POSTGRES_DB:-agentcore}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - t1
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: t1-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - t1
    deploy:
      resources:
        limits:
          memory: 256M

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: t1-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-t1_telemetry}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ch_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - t1
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: t1agentics/backend:local
    container_name: t1-backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Trust X-Forwarded-* from the Caddy reverse proxy so the app builds
      # https:// URLs (fixes mixed-content behind TLS termination).
      FORWARDED_ALLOW_IPS: "*"
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-agentcore}
      POSTGRES_USER: ${POSTGRES_USER:-agentcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # ClickHouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-t1_telemetry}
      # Secrets
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY}
      LEAD_DRAFT_SIGNING_SECRET: ${LEAD_DRAFT_SIGNING_SECRET}
      # Admin bootstrap (consumed by bootstrap_platform_admin.py)
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      # Public URLs
      DOMAIN: ${DOMAIN}
      BASE_URL: https://${DOMAIN}
      PUBLIC_URL: https://${DOMAIN}
      ALLOWED_ORIGINS: https://${DOMAIN}
      # AI provider (BYO API key - empty disables AI features)
      AI_PROVIDER: ${AI_PROVIDER:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_DEFAULT_MODEL: ${CLAUDE_DEFAULT_MODEL:-claude-sonnet-4-5-20250929}
      CLAUDE_MAX_DAILY_USD: ${CLAUDE_MAX_DAILY_USD:-25}
      # SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-T1 Agentics}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    volumes:
      # Optional single-file app config, applied idempotently on startup.
      # Absent file = clean no-op. Copy t1.config.yaml.example to get started.
      - ./t1.config.yaml:/app/t1.config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - t1
    deploy:
      resources:
        limits:
          memory: 3G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: t1agentics/frontend:local
    container_name: t1-frontend
    environment:
      # CRA env is baked at build time; nginx just serves static assets.
      REACT_APP_API_URL: https://${DOMAIN}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - t1
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    image: caddy:2-alpine
    container_name: t1-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - t1

networks:
  t1:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  ch_data:
  caddy_data:
  caddy_config:
