<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060b28" />

    <!-- Default title + description. Per-route pages override these via react-helmet-async. -->
    <title>T1 Agentics | AI-Assisted SOC Platform</title>
    <meta
      name="description"
      content="T1 Agentics is an AI-assisted Security Operations platform. Triage alerts in seconds, automate response with visual playbooks, and integrate with 700+ security tools."
    />
    <link rel="canonical" href="https://t1agentics.ai/" />

    <!-- OpenGraph (Facebook, LinkedIn, Slack, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="T1 Agentics" />
    <meta property="og:title" content="T1 Agentics | AI-Assisted SOC Platform" />
    <meta property="og:description" content="Triage alerts in seconds, automate response with visual playbooks, and integrate with 700+ security tools." />
    <meta property="og:url" content="https://t1agentics.ai/" />
    <meta property="og:image" content="https://t1agentics.ai/T1_Agentics_Logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="T1 Agentics | AI-Assisted SOC Platform" />
    <meta name="twitter:description" content="Triage alerts in seconds, automate response with visual playbooks, and integrate with 700+ security tools." />
    <meta name="twitter:image" content="https://t1agentics.ai/T1_Agentics_Logo.png" />

    <!-- Crawler hints. Specific noindex routes (e.g. /verify-email) override on the page itself. -->
    <meta name="robots" content="index, follow" />

    <link rel="icon" type="image/png" href="%PUBLIC_URL%/T1_Agentics_Logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured data: Organization. Helps Google's knowledge panel + sitelinks. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "T1 Agentics",
      "url": "https://t1agentics.ai/",
      "logo": "https://t1agentics.ai/T1_Agentics_Logo.png",
      "description": "AI-assisted Security Operations platform. Triage alerts in seconds, automate response with visual playbooks, and integrate with 700+ security tools.",
      "sameAs": []
    }
    </script>

    <!-- Structured data: the platform itself, so Google has something to show in software searches. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "T1 Agentics",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Web",
      "url": "https://t1agentics.ai/",
      "description": "AI-assisted Security Operations platform with autonomous alert triage, visual playbook editor, and 700+ integrations.",
      "offers": {
        "@type": "Offer",
        "url": "https://t1agentics.ai/contact"
      }
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
